  <link rel="stylesheet" href="style.css" />
  <style>
    .location-section {
      padding: 64px 48px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 48px;
      align-items: start;
    }

    .location-info h2 {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 24px;
    }

    .info-block {
      background: var(--white);
      border: 1px solid var(--teal-border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .info-icon {
      width: 36px;
      height: 36px;
      background: var(--teal-muted);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--teal);
    }

    .info-block h4 {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 4px;
    }

    .info-block p, .info-block a {
      font-size: .9rem;
      color: var(--dark);
      text-decoration: none;
      line-height: 1.5;
      display: block;
    }

    .info-block a:hover { color: var(--teal); }

    .map-container {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--teal-border);
      box-shadow: 0 4px 24px rgba(15,82,73,.1);
      height: 480px;
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    @media (max-width: 900px) {
      .location-section {
        grid-template-columns: 1fr;
        padding: 48px 20px;
        gap: 32px;
      }
      .map-container { height: 360px; }
    }
  </style>
</head>
